<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision - Premium Object Recognizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-texture"></div>
    
    <nav class="top-nav">
        <a href="index.html" class="nav-link-item">Lotto</a>
        <a href="ai_vision.html" class="nav-link-item active">AI Vision</a>
        <a href="ev_calculator.html" class="nav-link-item">EV Calc</a>
    </nav>

    <div class="vision-container">
        <header>
            <h1>AI <span class="highlight">Vision</span></h1>
            <p class="subtitle">Teachable Machine을 활용한 실시간 사물 인식</p>
        </header>

        <main>
            <div class="webcam-card">
                <div id="loading-overlay" class="loading-overlay">
                    <div class="spinner"></div>
                    <p id="loading-text">AI 시스템 준비 중...</p>
                </div>
                <div id="webcam-container"></div>
                <div id="setup-container" class="setup-container">
                    <div class="setup-icon">📷</div>
                    <div class="setup-actions">
                        <button id="connect-btn" class="glow-button">카메라 연결하기</button>
                        <div class="divider"><span>OR</span></div>
                        <label for="image-upload" class="outline-btn">
                            <span>이미지 업로드</span>
                            <input type="file" id="image-upload" accept="image/*" hidden>
                        </label>
                    </div>
                    <p class="setup-hint">카메라를 연결하거나 이미지를 업로드하여 분석을 시작하세요</p>
                </div>
                <div class="scan-line"></div>
            </div>

            <div id="label-container" class="label-container">
                <!-- Results will be injected here -->
            </div>
        </main>

        <footer>
            <p>&copy; 2026 AI Application Hub. Powered by TensorFlow.js</p>
        </footer>
    </div>

    <!-- TensorFlow.js and Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="vision.js" type="module"></script>
</body>
</html>
