<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Charging Calculator - Home Charging Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-texture"></div>
    
    <nav class="top-nav">
        <a href="index.html" class="nav-link-item">Lotto</a>
        <a href="ai_vision.html" class="nav-link-item">AI Vision</a>
        <a href="ev_calculator.html" class="nav-link-item active">EV Calc</a>
    </nav>

    <div class="container calculator-container">
        <header>
            <h1>EV <span class="highlight">Charging</span></h1>
            <p class="subtitle">가정용 전기차 충전 시간 및 비용 계산기</p>
        </header>

        <main class="calc-grid">
            <section class="input-section card">
                <div class="input-group">
                    <label>배터리 용량 (kWh)</label>
                    <div class="slider-with-input">
                        <input type="range" id="battery-capacity-range" min="10" max="150" value="77">
                        <input type="number" id="battery-capacity-input" value="77">
                    </div>
                </div>

                <div class="input-group">
                    <label>현재 잔량 (%)</label>
                    <div class="slider-with-input">
                        <input type="range" id="current-level-range" min="0" max="100" value="20">
                        <input type="number" id="current-level-input" value="20">
                    </div>
                </div>

                <div class="input-group">
                    <label>목표 잔량 (%)</label>
                    <div class="slider-with-input">
                        <input type="range" id="target-level-range" min="0" max="100" value="80">
                        <input type="number" id="target-level-input" value="80">
                    </div>
                </div>

                <div class="input-group">
                    <label>충전기 출력 (kW)</label>
                    <div class="preset-group">
                        <button class="preset-btn" data-value="3">3kW (220V)</button>
                        <button class="preset-btn active" data-value="7">7kW (완속)</button>
                        <button class="preset-btn" data-value="11">11kW (고속)</button>
                    </div>
                    <input type="number" id="charger-power-input" value="7" step="0.1">
                </div>

                <div class="input-group">
                    <label>전기 요금 (원/kWh)</label>
                    <input type="number" id="electricity-rate-input" value="200">
                </div>
            </section>

            <section class="result-section card">
                <div class="battery-visual">
                    <div class="battery-body">
                        <div id="battery-fill" class="battery-fill"></div>
                        <div class="battery-text">
                            <span id="display-percent">0%</span>
                        </div>
                    </div>
                    <div class="battery-tip"></div>
                </div>

                <div class="result-stats">
                    <div class="stat-item">
                        <span class="stat-label">필요 에너지</span>
                        <span class="stat-value"><strong id="energy-needed">0</strong> kWh</span>
                    </div>
                    <div class="stat-item highlight-stat">
                        <span class="stat-label">예상 소요 시간</span>
                        <span class="stat-value"><strong id="charging-time">0시간 0분</strong></span>
                    </div>
                    <div class="stat-item highlight-stat">
                        <span class="stat-label">예상 비용</span>
                        <span class="stat-value"><strong id="total-cost">0</strong> 원</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">완료 예정</span>
                        <span class="stat-value" id="finish-time">--:--</span>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 EV Lifestyle Hub. Powered by Smart Calculations.</p>
        </footer>
    </div>

    <script src="ev_logic.js"></script>
</body>
</html>
