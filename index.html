<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 추천</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        :root {
            --primary-color: #4a90e2;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --ball-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #333;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 2rem;
        }

        #result {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 2.5rem;
            min-height: 60px;
        }

        .set-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 15px;
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ball {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            box-shadow: var(--ball-shadow);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* 로또 공 색상 규칙 */
        .color-yellow { background: #fbc400; } /* 1-10 */
        .color-blue   { background: #69c8f2; } /* 11-20 */
        .color-red    { background: #ff7272; } /* 21-30 */
        .color-grey   { background: #aaaaaa; } /* 31-40 */
        .color-green  { background: #b0d840; } /* 41-45 */

        button {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }

        button:hover {
            background: #357abd;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 144, 226, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍀 행운의 번호</h1>
        <p>오늘의 행운을 잡으세요!</p>
        
        <div id="result">
            <!-- 번호 공들이 여기에 생성됩니다 -->
        </div>

        <button id="generateBtn">번호 추천받기</button>

        <div class="footer">
            © 2026 행운 로또 서비스
        </div>
    </div>

    <script>
        const resultContainer = document.getElementById('result');
        const generateBtn = document.getElementById('generateBtn');

        function getBallColorClass(num) {
            if (num <= 10) return 'color-yellow';
            if (num <= 20) return 'color-blue';
            if (num <= 30) return 'color-red';
            if (num <= 40) return 'color-grey';
            return 'color-green';
        }

        function generateSingleSet() {
            const numbers = [];
            while (numbers.length < 6) {
                const randomNum = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(randomNum)) {
                    numbers.push(randomNum);
                }
            }
            return numbers.sort((a, b) => a - b);
        }

        function generateLottoNumbers() {
            // 결과 영역 초기화
            resultContainer.innerHTML = '';

            for (let i = 0; i < 5; i++) {
                const numbers = generateSingleSet();
                const setRow = document.createElement('div');
                setRow.className = 'set-row';
                setRow.style.animationDelay = `${i * 0.15}s`;

                numbers.forEach((num, ballIndex) => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getBallColorClass(num)}`;
                    ball.textContent = num;
                    
                    // 세트별, 공별 순차적 애니메이션 지연 시간 설정
                    ball.style.animationDelay = `${(i * 0.15) + (ballIndex * 0.05)}s`;
                    
                    setRow.appendChild(ball);
                });

                resultContainer.appendChild(setRow);
            }
        }

        generateBtn.addEventListener('click', generateLottoNumbers);

        // 초기 화면에 빈 공 또는 안내 표시 대신 바로 하나 생성해줄 수 있음 (선택 사항)
        // generateLottoNumbers();
    </script>
</body>
</html>
